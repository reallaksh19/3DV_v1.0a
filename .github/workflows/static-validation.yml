name: Standalone Static Validation

on:
  push:
    branches:
      - main
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  validate-static-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static validation
        run: npm test

      - name: Run RVM evidence UI validation
        run: npm run test:evidence-ui
